name: Weekly Website Intelligence

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'

jobs:
  audit:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            https://silk-spices.web.app/index.html
          uploadArtifacts: false
          temporaryPublicStorage: true

      - name: Copy Lighthouse JSON
        run: cp .lighthouseci/*.report.json report.json

      - name: Install jq, bc & python
        run: sudo apt-get update && sudo apt-get install -y jq bc python3 python3-matplotlib

      - name: Extract Metrics
        run: |
          DATE=$(date +%Y-%m-%d)

          PERFORMANCE=$(jq '.categories.performance.score * 100' report.json | cut -d'.' -f1)
          SEO=$(jq '.categories.seo.score * 100' report.json | cut -d'.' -f1)
          ACCESSIBILITY=$(jq '.categories.accessibility.score * 100' report.json | cut -d'.' -f1)
          BEST=$(jq '.categories["best-practices"].score * 100' report.json | cut -d'.' -f1)

          LCP=$(jq '.audits["largest-contentful-paint"].numericValue' report.json | cut -d'.' -f1)
          CLS=$(jq '.audits["cumulative-layout-shift"].numericValue' report.json)
          TBT=$(jq '.audits["total-blocking-time"].numericValue' report.json | cut -d'.' -f1)

          echo "$DATE,$PERFORMANCE,$SEO,$ACCESSIBILITY,$BEST,$LCP,$CLS,$TBT" >> metrics-history.csv

      - name: Compute Trend & Regression
        run: |
          ROWS=$(wc -l < metrics-history.csv)

          if [ "$ROWS" -gt 2 ]; then
            PREV=$(tail -n 2 metrics-history.csv | head -n 1)
            CURR=$(tail -n 1 metrics-history.csv)

            PREV_PERF=$(echo $PREV | cut -d',' -f2)
            CURR_PERF=$(echo $CURR | cut -d',' -f2)

            DIFF=$((CURR_PERF - PREV_PERF))

            if [ "$DIFF" -lt -5 ]; then
              echo "REGRESSION=true" >> $GITHUB_ENV
              echo "DELTA=Performance dropped by ${DIFF#-}%" >> $GITHUB_ENV
            elif [ "$DIFF" -gt 0 ]; then
              echo "REGRESSION=false" >> $GITHUB_ENV
              echo "DELTA=Performance improved by $DIFF%" >> $GITHUB_ENV
            else
              echo "REGRESSION=false" >> $GITHUB_ENV
              echo "DELTA=Performance unchanged" >> $GITHUB_ENV
            fi
          else
            echo "REGRESSION=false" >> $GITHUB_ENV
            echo "DELTA=No previous data" >> $GITHUB_ENV
          fi

      - name: Generate Rolling Average
        run: |
          AVG=$(tail -n 4 metrics-history.csv | awk -F',' '{sum+=$2; count++} END {if(count>0) print int(sum/count); else print 0}')
          echo "ROLLING_AVG=$AVG" >> $GITHUB_ENV

      - name: Generate Executive Report
        run: |
          LAST=$(tail -n 1 metrics-history.csv)
          IFS=',' read DATE PERFORMANCE SEO ACCESSIBILITY BEST LCP CLS TBT <<< "$LAST"

          echo "WEEKLY WEBSITE INTELLIGENCE REPORT" > weekly-summary.txt
          echo "----------------------------------" >> weekly-summary.txt
          echo "Date: $DATE" >> weekly-summary.txt
          echo "" >> weekly-summary.txt
          echo "Performance: $PERFORMANCE%" >> weekly-summary.txt
          echo "4-Week Avg: $ROLLING_AVG%" >> weekly-summary.txt
          echo "$DELTA" >> weekly-summary.txt
          echo "" >> weekly-summary.txt
          echo "LCP: ${LCP}ms" >> weekly-summary.txt
          echo "CLS: $CLS" >> weekly-summary.txt
          echo "TBT: ${TBT}ms" >> weekly-summary.txt

      - name: Create Regression Issue
        if: env.REGRESSION == 'true'
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "🚨 Performance Regression Detected"
          content-filepath: weekly-summary.txt
          labels: regression, performance

      - name: Generate Performance Chart
        run: |
          python3 <<EOF
          import matplotlib.pyplot as plt
          import csv

          dates = []
          perf = []

          with open("metrics-history.csv") as f:
              reader = csv.DictReader(f)
              for row in reader:
                  dates.append(row["date"])
                  perf.append(int(row["performance"]))

          plt.figure()
          plt.plot(dates, perf)
          plt.xticks(rotation=45)
          plt.title("Website Performance Trend")
          plt.tight_layout()
          plt.savefig("performance-trend.png")
          EOF

      - name: Commit Updated Metrics
        run: |
          git config user.name "AI CTO Bot"
          git config user.email "bot@silkspices.com"
          git add metrics-history.csv
          git commit -m "Update weekly metrics"
          git push

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: executive-report
          path: weekly-summary.txt

      - name: Upload Performance Chart
        uses: actions/upload-artifact@v4
        with:
          name: performance-chart
          path: performance-trend.png

      - name: Send Email via SendGrid API
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          CONTENT=$(cat weekly-summary.txt | sed ':a;N;$!ba;s/\n/\\n/g')

          curl -X POST https://api.sendgrid.com/v3/mail/send \
            -H "Authorization: Bearer $SENDGRID_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"personalizations\": [{
                \"to\": [{\"email\": \"trade@silkpathenterprise.com\"}]
              }],
              \"from\": {\"email\": \"silkspices.automation@gmail.com\"},
              \"subject\": \"Weekly Website Intelligence Report\",
              \"content\": [{
                \"type\": \"text/plain\",
                \"value\": \"$CONTENT\"
              }]
            }"
