name: Weekly Website Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lighthouse via Official Action
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            https://silk-spices.web.app/index.html
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Rename Lighthouse Report
        run: |
          cp .lighthouseci/*.report.json report.json

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Create AI Request
        run: |
          REPORT=$(jq -c . report.json | head -c 10000)

          cat <<EOF > request.json
          {
            "model": "openchat/openchat-3.5-0106:free",
            "messages": [
              {
                "role": "user",
                "content": "You are an ecommerce website audit expert. Analyze this Lighthouse report and provide an executive summary, performance insights, SEO issues, accessibility risks, top 5 fixes, and revenue risk level.\n\n$REPORT"
              }
            ]
          }
          EOF

      - name: Call OpenRouter API
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          curl -X POST "https://openrouter.ai/api/v1/chat/completions" \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://github.com" \
            -H "X-Title: SilkSpices Audit" \
            --data @request.json \
            -o ai-response.json

      - name: Upload AI Analysis
        uses: actions/upload-artifact@v4
        with:
          name: ai-analysis
          path: ai-response.json
